<!DOCTYPE html>
<html lang="en">
  <!--  The head contains straight metadata about how the page will look    -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moda Demo</title>
    <!--  This is all CSS stuff, a language used to define styling -->
    <style>
      /* The root defines reusable color vars */
      :root {
        --ink: #1f2630;
        --accent: #0a7cff;
        --accent-soft: #e7f1ff;
        --line: #d7dee8;
        --paper: #fbfcfe;
        --success: #157347;
        --success-soft: #e9f6ef;
      }

      /* All elms have padding + border + elm size to the given width */
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh; /* 100% of vieport-height */
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, #f0f7ff, transparent 35%),
          linear-gradient(180deg, #ffffff 0%, #f5f8fc 100%);
        display: grid;
        place-items: center; /* Refers to the direct children of body in the html */
        padding: 24px;
      }

      /* The main container my stuff is in is called shell */
      /* These styling configs apply to it */
      .shell {
        width: min(720px, 100%);
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(215, 222, 232, 0.9);
        border-radius: 24px;
        box-shadow: 0 22px 60px rgba(29, 44, 71, 0.12);
        overflow: hidden; /* Clip any child element that extends past these borders */
      }

      .hero {
        padding: 28px 28px 18px;
        background:
          linear-gradient(135deg, rgba(10, 124, 255, 0.1), rgba(10, 124, 255, 0)),
          var(--paper);
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 2.75rem);
        line-height: 1;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      .panel {
        padding: 28px;
      }

      .dropzone {
        border: 2px dashed #9fbbdf;
        border-radius: 22px;
        padding: 28px 24px;
        background: #f9fbff;
        text-align: center;
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      }

      /* dropzone changes when a file gets dragged over it */
      .dropzone.dragover {
        border-color: var(--accent);
        background: var(--accent-soft);
        transform: scale(1.01);
      }

      .dropzone strong {
        display: block;
        margin-bottom: 10px;
        font-size: 1.1rem;
      }

      .actions {
        display: flex; /* List them out in a row */
        gap: 12px;
        justify-content: center;
        margin-top: 18px;
        flex-wrap: wrap;
      }

      button,
      .fake-button,
      .download-button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        background: var(--accent);
        color: white;
        font: inherit;
        padding: 12px 18px;
        cursor: pointer;
        text-decoration: none;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.6;
      }

      .fake-button {
        background: white;
        color: var(--ink);
        border: 1px solid var(--line);
      }

      .download-button {
        display: none;
        margin: 18px auto 0;
        width: fit-content;
        background: var(--success);
      }

      .download-button.ready {
        display: block;
      }

      /*  the # means reference id's */
      #file-name,
      #status {
        margin-top: 16px;
        text-align: center;
      }

      #status {
        min-height: 24px;
        font-weight: 600;
      }

      /* so this only applied to id=status AND class=success */
      #status.success {
        color: var(--success);
      }

      .result {
        display: none; /* this is why the result is inti hidden */
        margin-top: 18px;
        padding: 16px;
        border: 1px solid #b9e2c9;
        border-radius: 16px;
        background: var(--success-soft);
        text-align: center;
      }

      
      .result.ready {
        display: block;
      }

      input[type="file"] {
        display: none;
      }
    </style>
  </head>

  <!-- Note this body defines how the elements interact with each other,
   and here also the text -->
  <body>
    <main class="shell">
      <!-- hero is a common web design word for top section -->
      <section class="hero">
        <p><a href="/dashboard">Back to dashboard</a></p>
        <h1>Moda Demo</h1>
        <p>Drag in a purchase order PDF, run the Moda pipeline, and download the Shopify CSV.</p>
      </section>

      <section class="panel">
        <!-- class is used by css, id is used by javascript -->
        <div id="dropzone" class="dropzone">
          <strong>Drop a PDF here</strong>
          <span>or choose one from your computer</span>

          <div class="actions"> <!-- This is an element with defined style -->
            <label class="fake-button" for="pdf-input">Choose PDF</label> <!-- html convention that clicking a label with for="x" triggers selecting input with id="x"-->
            <button id="run-button" type="button" disabled>Run Demo Flow</button>
          </div>

          <!-- Here are a bunch of placeholder elements to get updates later-->
          <!-- Frontend checks are for convenience, backend is for enforcement -->
          <input id="pdf-input" type="file" accept=".pdf,application/pdf" />
          <div id="file-name">No PDF selected yet.</div> <!-- Gets updated later-->
          <div id="status"></div> 
          <div id="result" class="result">
            <strong>Your CSV is ready.</strong>
            <a id="download-link" class="download-button" href="#" download>Download here</a>
            <!-- # is placeholder, gets updated later. elms 'a' are links, this one made to appear like a button-->
          </div>
        </div>
      </section>
    </main>

    <!-- Everything in the script is JavaScript and makes the page interactive -->
    <script>

      // Here we are defining element vars by referencing the id used in the html
      const dropzone = document.getElementById("dropzone");
      const input = document.getElementById("pdf-input");
      const runButton = document.getElementById("run-button");
      const fileName = document.getElementById("file-name");
      const status = document.getElementById("status");
      const result = document.getElementById("result");
      const downloadLink = document.getElementById("download-link");

      let selectedFile = null; // let means we can change it later, const means we can't
      let downloadUrl = null;

      // Removes download url, releases it from browser memory, and removes
      // ready attribute to cause certain elements to hide
      function clearDownload() {
        if (downloadUrl) {
          URL.revokeObjectURL(downloadUrl);
          downloadUrl = null;
        }
        result.classList.remove("ready");
        downloadLink.classList.remove("ready");
        downloadLink.removeAttribute("href");
        downloadLink.removeAttribute("download");
      }

      // Called when file picked or dropped
      function setFile(file) {
        clearDownload();
        selectedFile = file;
        fileName.textContent = file ? `Selected: ${file.name}` : "No PDF selected yet."; // ternary condition
        runButton.disabled = !file;
        status.textContent = "";
        status.className = "";
      }

      // async keyword lets me use await within it
      // Without await, I get returned a 'promise' not the actual response
      async function runDemo() {
        if (!selectedFile) {
          return;
        }

        const formData = new FormData(); // FormData is browser provided object, useful for file uploads
        formData.append("pdf", selectedFile); // the name "pdf" matters here since my backend expects a field named "pdf"

        runButton.disabled = true;
        clearDownload();
        status.textContent = "Running Moda pipeline...";
        status.className = "";

        try {
          // this is where I send the post request to the same url or server but at the path /process
          // this path is important since my backend responds to requests sent exactly there
          const response = await fetch("/process", {
            method: "POST",
            body: formData, // this is the object 
          });

          if (!response.ok) {
            const body = await response.text();
            throw new Error(body || "Upload failed.");
          }

          const blob = await response.blob();
          const defaultName = `${selectedFile.name.replace(/\.pdf$/i, "") || "result"}_bulk-add.csv`;
          const contentDisposition = response.headers.get("Content-Disposition") || "";
          const match = contentDisposition.match(/filename="?([^"]+)"?/);
          const filename = match ? match[1] : defaultName;

          downloadUrl = URL.createObjectURL(blob); // creates temp pointer url for browser to download this object
          downloadLink.href = downloadUrl;
          downloadLink.download = filename;
          downloadLink.classList.add("ready");
          result.classList.add("ready");
          status.textContent = "Success. Click Download here to save the CSV.";
          status.className = "success";
        } catch (error) {
          status.textContent = `Something went wrong: ${error.message}`;
        } finally {
          runButton.disabled = !selectedFile;
        }
      }

      dropzone.addEventListener("dragover", (event) => {
        event.preventDefault();
        dropzone.classList.add("dragover");
      });

      dropzone.addEventListener("dragleave", () => {
        dropzone.classList.remove("dragover");
      });

      dropzone.addEventListener("drop", (event) => {
        event.preventDefault(); // browser default usually just to open
        dropzone.classList.remove("dragover");

        const [file] = event.dataTransfer.files; // [file] means first item of the  list and call it file
        if (file && file.type === "application/pdf") {
          setFile(file);
        } else {
          setFile(null);
          status.textContent = "Please drop a PDF file.";
        }
      });

      input.addEventListener("change", () => {
        const [file] = input.files;
        if (file) {
          setFile(file);
        }
      });

      runButton.addEventListener("click", runDemo);
      window.addEventListener("beforeunload", clearDownload);
    </script>
  </body>
</html>
